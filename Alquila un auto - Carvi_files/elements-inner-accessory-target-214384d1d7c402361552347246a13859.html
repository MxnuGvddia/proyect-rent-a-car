.Action {
  padding: var(--p-spacing1) calc(var(--p-spacing1) + var(--p-spacingSm));
  background-color: transparent;
  font-size: var(--fontSizeXs);
  font-weight: var(--fontWeightMedium);
  color: var(--colorPrimary);
  border-radius: min(5px, var(--borderRadius), var(--buttonBorderRadius));
  transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
}

.Action:hover {
  background-color: var(--p-colorBackgroundContrastAlpha05);
}

.Action--tertiary {
  color: var(--colorText);
}

.Action--danger {
  color: var(--colorDanger);
}

.Action:disabled {
  color: var(--p-colorPrimaryDisabledText);
}

.Block {
  padding: var(--p-spacing3);
  border-radius: var(--borderRadius);
  background-color: var(--colorBackground);
  border: 1px solid var(--p-colorBackgroundDeemphasize10);
  box-shadow: 0px 1px 1px rgba(0, 0, 0, 0.03), 0px 3px 6px rgba(0, 0, 0, 0.02);
}

.Button {
  padding: var(--buttonPadding);
  background-color: var(--buttonColorBackground);
  font-size: var(--buttonFontSize);
  font-weight: var(--buttonFontWeight);
  color: var(--buttonColorText);
  border-radius: var(--buttonBorderRadius);
  transition: background 0.15s ease, color 0.15s ease, border 0.15s ease, box-shadow .15s ease;
}

.Button:hover {
  background-color: var(--p-buttonColorBackgroundHover);
}

.Button:active {
  background-color: var(--p-buttonColorBackgroundActive);
}

.Button:disabled {
  background-color: var(--p-colorPrimaryDisabled);
  color: var(--p-colorPrimaryDisabledText);
}

  background-color: var(--colorBackground);
  border-radius: min(5px, var(--borderRadius));
  transition: background 0.15s ease, border 0.15s ease, box-shadow 0.15s ease;
  border: 1px solid var(--p-colorBackgroundDeemphasize10);
  box-shadow: 0px 1px 1px rgba(0, 0, 0, 0.03), 0px 3px 6px rgba(0, 0, 0, 0.02);
}

.CheckboxInput--checked {
  background-color: var(--colorPrimary);
  border-color: var(--colorPrimary);
}

  border-radius: var(--borderRadius);
  border: 1px solid var(--p-colorBackgroundDeemphasize10);
  box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.04), 0px 10px 24px rgba(0, 0, 0, 0.02);
}

  background-color: var(--colorBackground);
  padding: var(--p-spacing2) var(--p-spacing3);
}

.Error {
  margin-top: var(--p-spacing2);
  color: var(--colorDanger);
  font-size: var(--fontSizeSm);
}

.Icon {
  transition: fill 0.1s ease;
}

  border: 1px solid var(--inputColorBorder);
  box-shadow: var(--inputBoxShadow);
}
